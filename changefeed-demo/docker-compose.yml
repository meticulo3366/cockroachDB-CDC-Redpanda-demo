# ---------------------------------------------------------------------------
# CockroachDB CHANGEFEED -> Redpanda CDC demo
#
#   connect-mutator ─▶ CockroachDB(accounts) ═CHANGEFEED═▶ Redpanda(accounts_cdc)
#                                                                    │
#                                          connect-cdc-consumer ◀────┘
#                                                    └─▶ CockroachDB(accounts_audit)
#
# Host ports are offset from the root streaming demo so both can run at once.
# ---------------------------------------------------------------------------

name: rp-crdb-changefeed

services:
  redpanda:
    image: redpandadata/redpanda:v25.1.1
    container_name: cf-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:29092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "29092:29092"   # Kafka API (from host)
      - "9645:9644"     # Admin API / metrics
    volumes:
      - cf-redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  console:
    image: redpandadata/console:v3.0.0
    container_name: cf-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8089:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    entrypoint: ["/bin/sh", "-c", "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"]

  cockroachdb:
    image: cockroachdb/cockroach:v25.2.1
    container_name: cf-cockroachdb
    command: start-single-node --insecure --store=type=mem,size=2GiB
    ports:
      - "26258:26257"   # SQL (PostgreSQL wire)
      - "8081:8080"     # DB Console UI
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--execute=SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: schema + enable rangefeed + create the CHANGEFEED into Redpanda.
  crdb-init:
    image: cockroachdb/cockroach:v25.2.1
    container_name: cf-crdb-init
    depends_on:
      cockroachdb:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    volumes:
      - ./cockroach/schema.sql:/schema.sql:ro
      - ./cockroach/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    restart: "no"

  # Drives INSERT/UPDATE/DELETE on accounts (the change source).
  connect-mutator:
    image: docker.redpanda.com/redpandadata/connect:4.69.0
    container_name: cf-connect-mutator
    depends_on:
      crdb-init:
        condition: service_completed_successfully
    volumes:
      - ./connect/mutator.yaml:/connect.yaml:ro
    environment:
      COCKROACH_DSN: postgres://root@cockroachdb:26257/cdcbank?sslmode=disable
      MUTATE_INTERVAL: ${MUTATE_INTERVAL:-200ms}
    command: ["run", "/connect.yaml"]
    ports:
      - "4295:4195"

  # Consumes the changefeed topic and materializes accounts_audit.
  connect-cdc-consumer:
    image: docker.redpanda.com/redpandadata/connect:4.69.0
    container_name: cf-connect-cdc-consumer
    depends_on:
      redpanda:
        condition: service_healthy
      crdb-init:
        condition: service_completed_successfully
    volumes:
      - ./connect/cdc-consumer.yaml:/connect.yaml:ro
    environment:
      REDPANDA_BROKERS: redpanda:9092
      CDC_TOPIC: accounts_cdc
      CONSUMER_GROUP: cdc-audit
      COCKROACH_DSN: postgres://root@cockroachdb:26257/cdcbank?sslmode=disable
    command: ["run", "/connect.yaml"]
    ports:
      - "4296:4195"

volumes:
  cf-redpanda-data:
