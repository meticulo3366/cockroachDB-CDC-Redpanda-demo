# ---------------------------------------------------------------------------
# Redpanda -> CockroachDB streaming demo
#
#   connect-generator  ->  redpanda (topic: orders)  ->  connect-sink  ->  cockroachdb
#
# Everything runs on one Docker network. Service names (redpanda, cockroachdb)
# are the in-network hostnames the pipelines connect to.
# ---------------------------------------------------------------------------

name: rp-crdb-cdc

services:
  # ---- Redpanda broker -----------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v25.1.1
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Advertise the internal name for in-network clients and localhost for the host.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"   # Kafka API (from host)
      - "18082:18082"   # HTTP proxy (from host)
      - "9644:9644"     # Admin API / metrics
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- Redpanda Console (web UI for topics/consumers) ----------------------
  console:
    image: redpandadata/console:v3.0.0
    container_name: redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    entrypoint: ["/bin/sh", "-c", "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"]

  # ---- CockroachDB (single node, insecure -- demo only) --------------------
  cockroachdb:
    image: cockroachdb/cockroach:v25.2.1
    container_name: cockroachdb
    command: start-single-node --insecure --store=type=mem,size=2GiB
    ports:
      - "26257:26257"   # SQL (PostgreSQL wire)
      - "8080:8080"     # DB Console UI
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--execute=SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- One-shot schema bootstrap ------------------------------------------
  crdb-init:
    image: cockroachdb/cockroach:v25.2.1
    container_name: crdb-init
    depends_on:
      cockroachdb:
        condition: service_healthy
    volumes:
      - ./cockroach/schema.sql:/schema.sql:ro
    entrypoint:
      - /bin/sh
      - -c
      - "cockroach sql --insecure --host=cockroachdb:26257 --file=/schema.sql && echo 'schema applied'"
    restart: "no"

  # ---- Generator: synthetic orders -> Redpanda ----------------------------
  connect-generator:
    image: docker.redpanda.com/redpandadata/connect:4.69.0
    container_name: connect-generator
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ./connect/generator.yaml:/connect.yaml:ro
    environment:
      REDPANDA_BROKERS: redpanda:9092
      ORDERS_TOPIC: orders
      GENERATE_INTERVAL: ${GENERATE_INTERVAL:-100ms}
      GENERATE_COUNT: ${GENERATE_COUNT:-0}
    command: ["run", "/connect.yaml"]
    ports:
      - "4195:4195"   # health/metrics

  # ---- Sink: Redpanda -> CockroachDB --------------------------------------
  connect-sink:
    image: docker.redpanda.com/redpandadata/connect:4.69.0
    container_name: connect-sink
    depends_on:
      redpanda:
        condition: service_healthy
      crdb-init:
        condition: service_completed_successfully
    volumes:
      - ./connect/sink.yaml:/connect.yaml:ro
    environment:
      REDPANDA_BROKERS: redpanda:9092
      ORDERS_TOPIC: orders
      CONSUMER_GROUP: cockroach-sink
      COCKROACH_DSN: postgres://root@cockroachdb:26257/cdcdemo?sslmode=disable
    command: ["run", "/connect.yaml"]
    ports:
      - "4196:4195"   # health/metrics

volumes:
  redpanda-data:
